<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IndicSync — Indic Phonetic Similarity Detector</title>
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="IndicSync is a production-grade phonetic similarity engine designed for transliterated Indian Names and Place Entities. Detect spelling variations, historical aliases, and transliteration noise.">
    <meta name="keywords" content="Indic, Phonetic, Search, Devanagari, Address Matching, Indic Names, Similarity Engine, address deduplication, soundex, metaphone, NLP">
    <meta name="author" content="IndicSync Team">
    
    <!-- OpenGraph Social Tags -->
    <meta property="og:title" content="IndicSync — Indic Phonetic Similarity Detector">
    <meta property="og:description" content="High-performance transliteration and phonetic matching engine for Indian Names and Places.">
    <meta property="og:type" content="website">
    
    <!-- Emoji SVG Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎙️</text></svg>">
    
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Toast Notification Container -->
    <div id="toast-container" class="toast-container"></div>

    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <!-- Theme Toggle Button -->
    <button id="theme-toggle" class="btn-theme-toggle" aria-label="Toggle Light/Dark Theme">🌙</button>

    <main class="container">
        <header>
            <h1>Indic<span>Sync</span></h1>
            <p>Advanced phonetic similarity detector for Indian Names & Place Entities</p>
        </header>

        <section class="card glass">
            <div class="input-group">
                <div class="input-field">
                    <label for="name1">First Name / Place</label>
                    <input type="text" id="name1" placeholder="e.g. Sanjay" autocomplete="off" required>
                    <div id="name1-error" class="error-text hidden"></div>
                </div>
                <div class="input-field">
                    <label for="name2">Second Name / Place</label>
                    <input type="text" id="name2" placeholder="e.g. Sunjay" autocomplete="off" required>
                    <div id="name2-error" class="error-text hidden"></div>
                </div>
            </div>
            
            <!-- Advanced Settings Accordion -->
            <details class="advanced-settings-accordion">
                <summary>Advanced Tuning Options</summary>
                <div class="advanced-settings-content">
                    <div class="settings-control">
                        <label for="threshold-slider">Similarity Threshold: <span id="threshold-val">75%</span></label>
                        <input type="range" id="threshold-slider" min="0" max="100" value="75">
                    </div>
                    <div class="settings-control checkbox-control">
                        <input type="checkbox" id="aliases-checkbox" checked>
                        <label for="aliases-checkbox">Enable Administrative & Historical Alias Synonym Mapping</label>
                    </div>
                </div>
            </details>
            
            <button id="compare-btn" class="btn-primary">
                <span id="btn-text">Detect Similarity</span>
                <span id="btn-spinner" class="spinner hidden"></span>
                <span id="btn-arrow" class="btn-icon">→</span>
            </button>
        </section>

        <section id="result-section" class="result-container hidden">
            <div class="score-card glass">
                <div class="score-circle">
                    <svg viewBox="0 0 36 36" class="circular-chart">
                        <path class="circle-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                        <path id="score-path" class="circle" stroke-dasharray="0, 100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                    </svg>
                    <div class="score-text">
                        <span id="score-value">0</span>
                        <small>% Match</small>
                    </div>
                </div>
                <div class="status-badge" id="similarity-status">Highly Similar</div>
            </div>

            <div class="details-grid">
                <div class="detail-item glass">
                    <span class="label">Phonetic Code 1</span>
                    <span class="value" id="code1">-</span>
                </div>
                <div class="detail-item glass">
                    <span class="label">Phonetic Code 2</span>
                    <span class="value" id="code2">-</span>
                </div>
            </div>
        </section>

        <section class="samples">
            <h3>Try these examples:</h3>
            <div class="sample-chips">
                <button class="chip" data-n1="Varanasi" data-n2="Benares" aria-label="Compare Varanasi vs Benares">Varanasi vs Benares</button>
                <button class="chip" data-n1="Amit" data-n2="Ameet" aria-label="Compare Amit vs Ameet">Amit vs Ameet</button>
                <button class="chip" data-n1="Kolkata" data-n2="Calcutta" aria-label="Compare Kolkata vs Calcutta">Kolkata vs Calcutta</button>
                <button class="chip" data-n1="Thiruvananthapuram" data-n2="Trivandrum" aria-label="Compare Thiruvananthapuram vs Trivandrum">Trivandrum variants</button>
            </div>
        </section>
    </main>

    <script src="main.js"></script>
</body>
</html>
